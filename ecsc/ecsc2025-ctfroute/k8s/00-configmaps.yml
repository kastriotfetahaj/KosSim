            driver: wireguard
            port: 40000
            privateKey: aOpWz4NoZGbKFF2mnoK56tPMb5cpOPv97gbn2CXBn1I=
            publicKey: Kf+iWMitCCMyYAVVng/0F8aR5EQCcvsD+eVry2fgBwM=
        
        - id: 3
