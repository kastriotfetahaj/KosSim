apiVersion: v1
kind: ConfigMap
metadata:
  name: ctfroute-yml
data:
  ctfroute.yml: |
    instance:
      # https://docs.python.org/3/library/logging.config.html#dictionary-schema-details
      metrics: /var/ctfroute/metrics/metrics
      logging:
        version: 1
        incremental: true
        loggers:
          ctfroute.nft:
            level: INFO
          ctfroute.__main__:
            level: INFO
          ctfroute.adapters.kubernetes:
            level: INFO
          ctfroute.controllers.metrologist:
            level: INFO
          ctfroute.debug:
            level: INFO
    
    defaults:
      teams:
        anonymization:
          driver: netfilter
    
    adapters:
      - type: "kubernetes"
        namespace: github-runner
    
    initialState:
      gates:
        - id: block-ssh
          type: connection
          connSrc: any-team
          connDst: other-team
          expression: "tcp dport 22"
        
        - id: shield-team-1-port-2000
          type: connection
          connSrc: any-team
          connDst: team-1
          expression: "tcp dport 2000"
          period:
            fromTime: 2025-08-22T17:43:29+02:00
        
        # Created with 01-gates.yml
        # - id: block-team-2-port-2000
        
        - id: old-gate
          type: connection
          connSrc: any-team
          period:
            fromTime: 0
            toTime: 1755876776
        
        # Doesn't exist in kubernetes (if you use the default gates)
        - id: gate-that-will-be-deleted
          type: connection
          connSrc: any-team
          connDst: team-1
          expression: "tcp dport 2000"
      
      routers:
        - id: 1
          host: router-1.router.github-runner.svc.cluster.local
          teams: [ 1 ]
          connectivity:
            driver: wireguard
            port: 40000
            privateKey: QDFL+IGY2ROgX9Pj+sZ0IdccOpJdeJBwOPDmtCQGsmk=
            publicKey: AoHGD5N6Tk4bipYdLmV88PKdd38esPS/Oln/PV3A8Ws=
        
        - id: 2
          host: router-2.router.github-runner.svc.cluster.local
