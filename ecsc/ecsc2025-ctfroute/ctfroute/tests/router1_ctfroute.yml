templates:
  team:
    network: "10.0.{{ team.id }}.0/24"
    gateway: "10.0.{{ team.id }}.254"
    vulnbox: "10.0.{{ team.id }}.3"

defaults:
  teams:
    anonymization:
      driver: netfilter
  routers:
    connectivity:
      driver: hostname
      
adapters:
