---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gates.ctfroute.attacking-lab.com
spec:
  scope: Namespaced
  group: ctfroute.attacking-lab.com
  names:
    kind: Gate
    plural: gates
    singular: gates
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          x-kubernetes-validations:
            - rule: "self.spec.type == 'raw' ? has(self.spec.rule) : true"
              message: "spec.rule is required when spec.type is 'raw'."
            - rule: "self.spec.type == 'raw' ? !(has(self.spec.connSrc) || has(self.spec.connDst) || has(self.spec.expression)) : true"
              message: "connSrc/connDst/expression is not allowed when spec.type is 'raw'."
            - rule: "self.spec.type == 'connection' ? !has(self.spec.rule) : true"
              message: "spec.rule must not be set when spec.type is 'connection'"
          required: [ "spec" ]
          properties:
            spec:
              # Discriminated union: ConnGate | RawGate via spec.type
              oneOf:
                - required: [ "type", "rule" ]
                  properties:
                    type:
                      enum: [ "raw" ]
                - required: [ "type" ]
                  properties:
                    type:
                      enum: [ "connection" ]
              type: object
              properties:
                type:
                  type: string
                  enum:
                    - connection
                    - raw
                period:
                  nullable: true
                  type: object
                  description: Time during which gate takes effect
                  properties:
                    fromTime:
                      type: string
                      nullable: true
                    toTime:
                      type: string
                      nullable: true
                connSrc:
                  type: string
                  nullable: true
                  description: NetRef for connection source
                  pattern: "^(known|unkown|any-vulnbox|any-team|same-team|other-team)|((team-|vulnbox-|game-).{1,13})"
                connDst:
                  type: string
                  nullable: true
                  description: NetRef for connection destination
                  pattern: "^(known|unkown|any-vulnbox|any-team|same-team|other-team)|((team-|vulnbox-|game-).{1,13})"
                expression:
                  type: string
                  nullable: true
                  description: Optional nftables expression to further scope the gate
                rule:
                  type: string
                  description: Raw nft rule/expression
      subresources:
        status: { }
