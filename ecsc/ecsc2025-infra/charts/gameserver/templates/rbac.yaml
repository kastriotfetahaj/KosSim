apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ctfroute-gameserver
  labels:
    {{- include "gameserver.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - ctfroute.attacking-lab.com
    resources:
      - gates
    verbs:
      - watch
      - get
      - list
      - create
      - delete
      - patch
      - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ctfroute-gameserver
  labels:
    {{- include "gameserver.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ctfroute-gameserver
subjects:
  - kind: ServiceAccount
    name: gameserver
