apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    {{- include "ctf-monitoring.labels" . | nindent 4 }}
  name: oauth2-proxy-grafana
data:
  oauth2_proxy.cfg: |
    upstreams = [
                "http://ctf-grafana-service.{{ .Release.Namespace }}.svc.cluster.local:3000"
    ]
    provider = "keycloak-oidc"
    oidc_issuer_url = "https://auth.attacking-lab.com/realms/master"
    redirect_url = "https://grafana-{{ .Values.ctf }}.gartenverein-tackenberg.de/oauth2/callback"
    allowed_groups = "admin"
    code_challenge_method = "S256"
    email_domains = "*"
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: grafana-oauth2-proxy
    {{- include "ctf-monitoring.labels" . | nindent 4 }}
  name: grafana-oauth2-proxy
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      appProtocol: http
      name: http
    - port: 44180
      protocol: TCP
      appProtocol: http
      targetPort: metrics
      name: metrics
  selector:
    app: grafana-oauth2-proxy
    {{- include "ctf-monitoring.selectorLabels" . | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: grafana-oauth2-proxy
    {{- include "ctf-monitoring.labels" . | nindent 4 }}
  name: grafana-oauth2-proxy
spec:
  replicas: {{ .Values.replicaCounts.oauth2Proxy }}
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: grafana-oauth2-proxy
      {{- include "ctf-monitoring.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
      {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        app: grafana-oauth2-proxy
        {{- include "ctf-monitoring.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      containers:
        - name: oauth2-proxy
          image: "quay.io/oauth2-proxy/oauth2-proxy:v7.12.0"
          imagePullPolicy: IfNotPresent
          args:
            - --http-address=0.0.0.0:4180
            - --https-address=0.0.0.0:4443
            - --metrics-address=0.0.0.0:44180
            - --config=/etc/oauth2_proxy/oauth2_proxy.cfg
          env:
            - name: OAUTH2_PROXY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.grafanaOAuthSecretName }}
                  key: client-id
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.grafanaOAuthSecretName }}
                  key: client-secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.grafanaOAuthSecretName }}
                  key: cookie-secret
          ports:
            - containerPort: 4180
              name: http
              protocol: TCP
            - containerPort: 44180
              protocol: TCP
              name: metrics
          livenessProbe:
            httpGet:
              path: /ping
              port: http
              scheme: HTTP
            initialDelaySeconds: 0
            timeoutSeconds: 1
          readinessProbe:
            httpGet:
              path: /ready
              port: http
              scheme: HTTP
            initialDelaySeconds: 0
            timeoutSeconds: 5
            successThreshold: 1
            periodSeconds: 10
          resources:
            { }
          volumeMounts:
            - mountPath: /etc/oauth2_proxy/oauth2_proxy.cfg
              name: config
              subPath: oauth2_proxy.cfg
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsGroup: 2000
            runAsNonRoot: true
            runAsUser: 2000
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - configMap:
            defaultMode: 420
            name: oauth2-proxy-grafana
          name: config
