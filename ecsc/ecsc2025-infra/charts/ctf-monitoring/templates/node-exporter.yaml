{{- if not .Values.analysisMode }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: node-exporter
  labels:
    app: node-exporter
    {{- include "ctf-monitoring.labels" . | nindent 4 }}
automountServiceAccountToken: false
---
apiVersion: v1
kind: Service
metadata:
  name: node-exporter-nonrouter
  labels:
    app: node-exporter-nonrouter
    {{- include "ctf-monitoring.labels" . | nindent 4 }}
  annotations:
    prometheus.io/scrape: "true"
spec:
  type: ClusterIP
  ports:
    - port: 9100
      targetPort: 9100
      protocol: TCP
      name: metrics
  selector:
    app: node-exporter-nonrouter
    {{- include "ctf-monitoring.selectorLabels" . | nindent 4 }}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-exporter-nonrouter
  labels:
    app: node-exporter-nonrouter
    {{- include "ctf-monitoring.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: node-exporter-nonrouter
      {{- include "ctf-monitoring.selectorLabels" . | nindent 6 }}
  revisionHistoryLimit: 10
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 100%
  template:
    metadata:
      labels:
        app: node-exporter-nonrouter
        {{- include "ctf-monitoring.selectorLabels" . | nindent 8 }}
    spec:
      {{- include "ctf-monitoring.nodeExporterTemplateSpec" . | nindent 6 }}
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: ctfr.attacking-lab.com/ctf
                    operator: In
                    values: [{{ .Values.ctf }}]
                  - key: ctfr.attacking-lab.com/role
                    operator: NotIn
                    values: [ router ]
---
# We target these through the "router" service
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-exporter-router
  labels:
    app: node-exporter-router
    {{- include "ctf-monitoring.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: node-exporter-router
      {{- include "ctf-monitoring.selectorLabels" . | nindent 6 }}
  revisionHistoryLimit: 10
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 100%
  template:
    metadata:
      labels:
        app: node-exporter-router
        {{- include "ctf-monitoring.selectorLabels" . | nindent 8 }}
    spec:
      {{- include "ctf-monitoring.nodeExporterTemplateSpec" . | nindent 6 }}
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: ctfr.attacking-lab.com/ctf
                    operator: In
                    values: [{{ .Values.ctf }}]
                  - key: ctfr.attacking-lab.com/role
                    operator: In
                    values: [ router ]
{{- end}}
