---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ctf-monitoring.serviceAccountName" . }}-prometheus
  labels:
    {{- include "ctf-monitoring.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "ctf-monitoring.serviceAccountName" . }}-{{ .Release.Namespace }}-prometheus
  labels:
    {{- include "ctf-monitoring.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
  - kind: ServiceAccount
    namespace: {{ .Release.Namespace }}
    name: {{ include "ctf-monitoring.serviceAccountName" . }}-prometheus
---
