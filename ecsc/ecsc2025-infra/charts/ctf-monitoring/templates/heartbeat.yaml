{{- if not .Values.analysisMode }}
---
apiVersion: beat.k8s.elastic.co/v1beta1
kind: Beat
metadata:
  name: heartbeat-public
  labels:
    {{- include "ctf-monitoring.labels" . | nindent 4 }}
spec:
  type: heartbeat
  version: 9.0.0
  elasticsearchRef:
    name: ctf
  config:
    heartbeat.monitors:
      - type: icmp
        id: ping-routers
        name: My Host Ping
        hosts: [ "canary.{{ .Release.Namespace }}.svc.cluster.local" ]
        schedule: '*/5 * * * * * *'
  deployment:
    replicas: 1
    podTemplate:
      spec:
        securityContext:
          runAsUser: 0
---
apiVersion: beat.k8s.elastic.co/v1beta1
kind: Beat
metadata:
  name: heartbeat-checker
  labels:
    {{- include "ctf-monitoring.labels" . | nindent 4 }}
spec:
  type: heartbeat
  version: 9.0.0
  elasticsearchRef:
    name: ctf
  config:
    heartbeat.monitors:
      - type: icmp
        id: ping-vulnboxes-from-checker
        name: Vulnbox ping
        hosts: [ "vulnboxes.{{ .Release.Namespace }}.svc.cluster.local" ]
        schedule: '*/5 * * * * * *'
      - type: icmp
        id: ping-exploiter-from-checker
        name: Exploiter ping
        hosts: [ "exploiters.{{ .Release.Namespace }}.svc.cluster.local" ]
        schedule: '*/5 * * * * * *'
  deployment:
    replicas: 1
    podTemplate:
      spec:
        hostNetwork: true
        dnsPolicy: ClusterFirstWithHostNet
        nodeSelector:
          ctfr.attacking-lab.com/ctf: {{ .Values.ctf }}
          ctfr.attacking-lab.com/role: infra
          ctfr.attacking-lab.com/observer: "true"
        tolerations:
          {{- include "ctf-monitoring.infraTolerations" . | nindent 10 }}
        securityContext:
          runAsUser: 0
---
apiVersion: beat.k8s.elastic.co/v1beta1
kind: Beat
metadata:
  name: heartbeat-gameserver
  labels:
    {{- include "ctf-monitoring.labels" . | nindent 4 }}
spec:
  type: heartbeat
  version: 9.0.0
  elasticsearchRef:
    name: ctf
  config:
    heartbeat.monitors:
      - type: icmp
        id: ping-vulnboxes-from-gameserver
        name: Vulnbox ping
        hosts: [ "vulnboxes.{{ .Release.Namespace }}.svc.cluster.local" ]
        schedule: '*/5 * * * * * *'
      - type: icmp
        id: ping-exploiters-from-gameserver
        name: Exploiter ping
        hosts: [ "exploiters.{{ .Release.Namespace }}.svc.cluster.local" ]
        schedule: '*/5 * * * * * *'
  deployment:
    replicas: 1
    podTemplate:
      hostNetwork: true
      spec:
        nodeSelector:
          {{- include "ctf-monitoring.gameserverNodeSelector" . | nindent 10 }}
        tolerations:
          {{- include "ctf-monitoring.infraTolerations" . | nindent 10 }}
        securityContext:
          runAsUser: 0
{{- end }}
