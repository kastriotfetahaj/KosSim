# Source: ctf-monitoring/templates/grafana.yaml
apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: ctf-grafana
  labels:
    helm.sh/chart: ctf-monitoring-0.1.0
    app.kubernetes.io/name: ctf-monitoring
    app.kubernetes.io/instance: ctf-monitoring
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    dashboards: ctf-grafana
    datasources: ctf-grafana
spec:
  config:
    auth:
      disable_login_form: "true"
    auth.basic:
      enabled: "false"
    auth.anonymous:
      enabled: "true"
      org_name: Main Org.
      org_role: Admin
  deployment:
    spec:
      replicas: 1
      template:
        spec:
          nodeSelector:
            ctfr.attacking-lab.com/role: worker
            ctfr.attacking-lab.com/ctf: demo-1
          tolerations:
            - key: ctfr.attacking-lab.com/role
              operator: Equal
              value: worker
              effect: NoExecute
            - key: ctfr.attacking-lab.com/ctf
              operator: Equal
              value: demo-1
              effect: NoExecute
