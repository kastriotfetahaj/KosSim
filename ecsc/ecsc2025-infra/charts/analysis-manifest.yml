apiVersion: monitoring.coreos.com/v1
kind: Prometheus
metadata:
  name: ctf-prometheus
  labels:
    helm.sh/chart: ctf-monitoring-0.1.0
    app.kubernetes.io/name: ctf-monitoring
    app.kubernetes.io/instance: ctf-monitoring
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 2
  serviceAccountName: ctf-monitoring-prometheus
  # Target all config resources in the namespace
  serviceMonitorSelector:
    matchLabels: { }
  scrapeConfigSelector:
    matchLabels: { }
  podMonitorSelector:
    matchLabels: { }
  ruleSelector:
    matchLabels: { }
  probeSelector:
    matchLabels: { }
  # Needed because the ctfroute service only has EndpointSlices, no Endpoints
  serviceDiscoveryRole: EndpointSlice
  # We have to set either size or duration to override the default "24h"
  retentionSize: 99GiB
  nodeSelector:
    ctfr.attacking-lab.com/role: core
  tolerations:
    - key: ctfr.attacking-lab.com/role
      operator: Equal
      value: core
      effect: NoExecute
  securityContext:
    fsGroup: 2000
    runAsGroup: 2000
    runAsNonRoot: true
    runAsUser: 1000
    seccompProfile:
      type: RuntimeDefault
  storage:
    volumeClaimTemplate:
      spec:
        resources:
          requests:
            storage: 20Gi
        storageClassName: longhorn-zone-replicated
