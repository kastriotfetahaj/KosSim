# Source: ctf-monitoring/templates/grafana-oauth.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: grafana-oauth2-proxy
    helm.sh/chart: ctf-monitoring-0.1.0
    app.kubernetes.io/name: ctf-monitoring
    app.kubernetes.io/instance: ctf-monitoring
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
  name: grafana-oauth2-proxy
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: grafana-oauth2-proxy
      app.kubernetes.io/name: ctf-monitoring
      app.kubernetes.io/instance: ctf-monitoring
  template:
    metadata:
      labels:
        app: grafana-oauth2-proxy
        app.kubernetes.io/name: ctf-monitoring
        app.kubernetes.io/instance: ctf-monitoring
    spec:
      containers:
        - name: oauth2-proxy
          image: "quay.io/oauth2-proxy/oauth2-proxy:v7.12.0"
          imagePullPolicy: IfNotPresent
          args:
            - --http-address=0.0.0.0:4180
            - --https-address=0.0.0.0:4443
            - --metrics-address=0.0.0.0:44180
            - --config=/etc/oauth2_proxy/oauth2_proxy.cfg
          env:
            - name: OAUTH2_PROXY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-grafana
                  key: client-id
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-grafana
                  key: client-secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-grafana
                  key: cookie-secret
          ports:
            - containerPort: 4180
              name: http
              protocol: TCP
            - containerPort: 44180
              protocol: TCP
              name: metrics
          livenessProbe:
            httpGet:
              path: /ping
              port: http
              scheme: HTTP
            initialDelaySeconds: 0
            timeoutSeconds: 1
          readinessProbe:
            httpGet:
              path: /ready
              port: http
              scheme: HTTP
            initialDelaySeconds: 0
            timeoutSeconds: 5
            successThreshold: 1
            periodSeconds: 10
          resources:
            { }
          volumeMounts:
            - mountPath: /etc/oauth2_proxy/oauth2_proxy.cfg
              name: config
              subPath: oauth2_proxy.cfg
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsGroup: 2000
            runAsNonRoot: true
            runAsUser: 2000
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - configMap:
            defaultMode: 420
            name: oauth2-proxy-grafana
          name: config
---
# Source: ctf-monitoring/templates/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-oauth2-proxy
  labels:
    helm.sh/chart: ctf-monitoring-0.1.0
    app.kubernetes.io/name: ctf-monitoring
    app.kubernetes.io/instance: ctf-monitoring
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - grafana-demo-1.gartenverein-tackenberg.de
  rules:
    - host: grafana-demo-1.gartenverein-tackenberg.de
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana-oauth2-proxy
                port:
                  name: http
