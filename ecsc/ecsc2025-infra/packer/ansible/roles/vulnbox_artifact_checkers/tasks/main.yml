### load checker repos just in case
- name: Create /root/checker_repos_backup
  ansible.builtin.file:
    path: "/root/checker_repos_backup"
    state: directory
    mode: "0755"

- name: "Clone checker backups"
  ansible.builtin.command:
    argv: ["git", "clone", "{{ item }}"]
    chdir: "/root/checker_repos_backup"
  with_items: "{{ vulnbox_artifact_checkers_submodule_urls.stdout_lines }}"
