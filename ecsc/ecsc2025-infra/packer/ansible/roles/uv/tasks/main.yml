---
- name: "Download UV install script"
  ansible.builtin.get_url:
    url: https://astral.sh/uv/install.sh
    dest: "/tmp/install_uv.sh"
    mode: "0744"

- name: "Run uv install script"
  ansible.builtin.command:
    argv: ["/tmp/install_uv.sh"]
  environment:
    UV_INSTALL_DIR: "/usr/local/bin"
  changed_when: true

# - name: "Source uv into current context"
#   ansible.builtin.shell: ". $HOME/.local/bin/env"
- name: "Manually Update shell"
  ansible.builtin.command:
    argv: ["uv", "tool", "update-shell"]
