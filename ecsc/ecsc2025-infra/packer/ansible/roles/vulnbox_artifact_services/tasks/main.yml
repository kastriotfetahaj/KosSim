- name: "Template vulnbox-artifacts path"
  ansible.builtin.set_fact:
    vulnbox_artifact_services_local_repo_path: "./services/{{ inventory_hostname }}/vulnbox_artifacts"

- name: Clean local services cache
  become: false
  ansible.builtin.file:
    path: "{{ vulnbox_artifact_services_local_repo_path }}"
    state: absent
    mode: "0755"
  delegate_to: localhost

- name: "Pull vulnbox-repo"
  become: false
  ansible.builtin.git: # noqa: latest
    repo: "{{ vulnbox_artifact_services_repo_url }}"
    dest: "{{ vulnbox_artifact_services_local_repo_path }}"
  delegate_to: localhost

- name: 'Log builder into "artifact" registry'
  ansible.builtin.command:
    argv:
      - docker
      - login
      - "--username"
      - "{{ vulnbox_artifact_services_registry.username }}"
      - "--password-stdin"
      - "{{ vulnbox_artifact_services_registry.server }}"
    stdin: "{{ vulnbox_artifact_services_registry.password }}\n"
  delegate_to: localhost

- name: "Run build step"
  become: false
  ansible.builtin.command:
    chdir: "{{ vulnbox_artifact_services_local_repo_path }}"
    argv: ["bash", "build_artifacts.sh"]
  delegate_to: localhost
  changed_when: true

