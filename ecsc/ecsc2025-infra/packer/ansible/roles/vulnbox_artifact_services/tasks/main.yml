### LIVE SERVICES AUTOSTART
- name: "Deploy Services (Autostart)"
  # when: "vulnbox_services_repo_encryption_pw == None"
  block:
    - name: "Copy services to vulnbox"
      ansible.posix.synchronize:
        src: "{{ vulnbox_artifact_services_local_repo_path }}/vulnbox/"
        dest: "/root/services"
        rsync_path: "sudo rsync"

    - name: "Find services on vulnbox"
      ansible.builtin.find:
        paths: "/root/services"
        recurse: false
        file_type: directory
      register: vulnbox_artifact_services_service_directories

    - name: "Load all provided docker images"
      ansible.builtin.shell:
        executable: /usr/bin/bash
        cmd: |
          shopt -s nullglob
          for image_tar in images/*; do
            echo "Loading image tar $image_tar";
            docker load -i "$image_tar";
          done
        chdir: "{{ item.path }}"
      with_items: "{{ vulnbox_artifact_services_service_directories.files }}"

    - name: "Pull images"
      ansible.builtin.command:
        argv: ["docker", "compose", "pull", "--ignore-buildable", "--include-deps"]
        chdir: "{{ item.path }}"
      with_items: "{{ vulnbox_artifact_services_service_directories.files }}"

    - name: "Build service"
      ansible.builtin.command:
        argv: ["docker", "compose", "build"]
        chdir: "{{ item.path }}"
      with_items: "{{ vulnbox_artifact_services_service_directories.files }}"

    # Only build DO NOT START! (secrets are generated in this step)
    # - name: "Pre-Start services"
    #   ansible.builtin.command:
    #     argv: ["docker", "compose", "up", "--build", "-d"]
    #     chdir: "{{ item.path }}"
    #   with_items: "{{ vulnbox_artifact_services_service_directories.files }}"

    - name: "Set up systemd unit"
      ansible.builtin.copy:
        src: start-vulnservices.service
        dest: /etc/systemd/system/start-vulnservices.service
        mode: "0644"

    - name: "Pre-Start services"
      ansible.builtin.command:
        argv: ["systemctl", "enable", "start-vulnservices.service"]
