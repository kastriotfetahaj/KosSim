apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: coredns
  namespace: kube-system
spec:
  # This flag causes helm controller to select control plane nodes for the
  # "helm-install-" Job. They won't be scheduled there since we are also using our own
  # taint for these nodes, so it get's stuck.
  # bootstrap: true
  failurePolicy: abort
  targetNamespace: kube-system
  repo: https://coredns.github.io/helm
  chart: coredns
  version: 1.43.2
  valuesContent: |-
    replicaCount: 3  
    
    nodeSelector:
      node-role.kubernetes.io/control-plane: "true"
 
    tolerations:
      - key: ctfr.attacking-lab.com/role
        operator: Equal
        value: control-plane
        effect: NoSchedule

    service:
      clusterIP: 10.238.0.10
