# This is unfortunately an enterprise-feature :/
apiVersion: stackconfigpolicy.k8s.elastic.co/v1alpha1
kind: StackConfigPolicy
metadata:
  name: enolog
  namespace: elastic
spec:
  resourceSelector:
    matchLabels:
      name: core
  elasticsearch:
    indexLifecyclePolicies:
      enolog3days:
        phases:
          delete:
            min_age: 3d
            actions:
              delete:
                delete_searchable_snapshot: true
          hot:
            min_age: 0ms
            actions:
              rollover:
                max_age: 1d
    indexTemplates:
      composableIndexTemplates:
        index_patterns:
          - 'enologmessage*'
        template:
          settings:
            index:
              lifecycle:
                name: enolog3days
              mode: standard
          mappings:
            dynamic: false
            properties:
              agent:
                type: object
                properties:
                  hostname:
                    type: text
                    fields:
                      keyword:
                        ignore_above: 256
                        type: keyword
                  id:
                    type: text
                    fields:
                      keyword:
                        ignore_above: 256
                        type: keyword
                  ephemeral_id:
                    type: text
                    fields:
                      keyword:
                        ignore_above: 256
                        type: keyword
                  type:
                    type: text
                    fields:
                      keyword:
                        ignore_above: 256
                        type: keyword
                  version:
                    type: text
                    fields:
                      keyword:
                        ignore_above: 256
                        type: keyword
              '@timestamp':
                type: date_nanos
              ecs:
                type: object
                properties:
                  version:
                    type: text
                    fields:
                      keyword:
                        ignore_above: 256
                        type: keyword
              log:
                type: object
                properties:
                  file:
                    type: object
                    properties:
                      path:
                        type: text
                        fields:
                          keyword:
                            ignore_above: 256
                            type: keyword
                  offset:
                    type: long
              '@version':
                type: text
                fields:
                  keyword:
                    ignore_above: 256
                    type: keyword
              enologs:
                type: object
                properties:
                  currentRoundId:
                    type: long
                  severity:
                    type: text
                    fields:
                      keyword:
                        ignore_above: 256
                        type: keyword
                  teamName:
                    type: text
                    fields:
                      keyword:
                        ignore_above: 256
                        type: keyword
                  flag:
                    type: text
                    fields:
                      keyword:
                        ignore_above: 256
                        type: keyword
                  method:
                    type: text
                    fields:
                      keyword:
                        ignore_above: 256
                        type: keyword
                  taskChainId:
                    type: text
                    fields:
                      keyword:
                        ignore_above: 256
                        type: keyword
                  relatedRoundId:
                    type: long
                  module:
                    type: text
                    fields:
                      keyword:
                        ignore_above: 256
                        type: keyword
                  message:
                    type: text
                    fields:
                      keyword:
                        ignore_above: 256
                        type: keyword
                  serviceName:
                    type: text
                    fields:
                      keyword:
                        ignore_above: 256
                        type: keyword
                  type:
                    type: text
                    fields:
                      keyword:
                        ignore_above: 256
                        type: keyword
                  tool:
                    type: text
                    fields:
                      keyword:
                        ignore_above: 256
                        type: keyword
                  severityLevel:
                    type: long
                  function:
                    type: text
                    fields:
                      keyword:
                        ignore_above: 256
                        type: keyword
                  teamId:
                    type: long
                  variantId:
                    type: long
                  taskId:
                    type: long
                  timestamp:
                    type: date_nanos
              tags:
                type: text
                fields:
                  keyword:
                    ignore_above: 256
                    type: keyword
        composed_of: [ ]
        data_stream:
          hidden: false
          allow_custom_routing: false
        ignore_missing_component_templates: [ ]
---
