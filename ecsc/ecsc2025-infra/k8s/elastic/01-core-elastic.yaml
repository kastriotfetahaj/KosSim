---
apiVersion: elasticsearch.k8s.elastic.co/v1
kind: Elasticsearch
metadata:
  name: core
  labels:
    name: core
  namespace: elastic
spec:
  version: "9.1.3"
  secureSettings:
    - secretName: s3-hetzner-elastic
      entries:
        - key: access_key
          path: s3.client.hetzner.access_key
        - key: secret_key
          path: s3.client.hetzner.secret_key
  nodeSets:
    - name: default
      count: 2
      config:
        node.store.allow_mmap: false
        s3.client.hetzner:
          # provisioned with secret (see above)
          # access_key
          # secret_key
          endpoint: "hel1.your-objectstorage.com"
          protocol: https
      volumeClaimTemplates:
        - metadata:
            name: elasticsearch-data
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 20G
            storageClassName: longhorn-core-ha-databases
      podTemplate:
        spec:
          containers:
            - name: elasticsearch
              resources:
                limits:
                  memory: 8G
          nodeSelector:
            ctfr.attacking-lab.com/role: core
          tolerations:
            - key: ctfr.attacking-lab.com/role
              operator: Equal
              value: core
              effect: NoExecute
---
apiVersion: kibana.k8s.elastic.co/v1
kind: Kibana
metadata:
  name: core
  namespace: elastic
spec:
  version: "9.1.3"
  count: 1
  elasticsearchRef:
    name: core
  secureSettings:
    - secretName: core-es-elastic-user
      entries:
        - key: elastic
          path: xpack.security.authc.providers.anonymous.anonymous1.credentials.password
  config:
    xpack.security.authc.providers:
      basic.basic1:
        order: 0
      anonymous.anonymous1:
        order: 1
        credentials:
          username: "elastic"
  podTemplate:
    spec:
      nodeSelector:
        ctfr.attacking-lab.com/role: core
      tolerations:
        - key: ctfr.attacking-lab.com/role
          operator: Equal
          value: core
          effect: NoExecute
---
