apiVersion: v1
kind: Service
metadata:
  name: platform
  labels:
    {{ include "platform.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      appProtocol: http
      name: http
  selector:
    app: platform
    {{- include "platform.selectorLabels" . | nindent 4}}
---
apiVersion: v1
kind: Service
metadata:
  name: platform-redis
  labels:
    {{ include "platform.labels" . | nindent 4 }}
spec:
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app: platform-redis
    {{- include "platform.selectorLabels" . | nindent 4}}
