name: saarctf-${DEPLOYMENT:?error}

volumes:
  caddy-data:
  caddy-config:
  staticfiles:
  imagefiles:
  postgres:
  redis:

x-common-django: &common-django
  image: ${IMAGE_NAME:-ad-platform}
  build:
    context: ../
    dockerfile: docker/Dockerfile
    target: django
  volumes:
    - staticfiles:/opt/app/static_collected
    - imagefiles:/opt/app/uploads
    - ../mainpage/vm_templates.json:/opt/app/mainpage/vm_templates.json
    - ../mainpage/deployment_settings.py:/opt/app/mainpage/deployment_settings.py
  environment:
    PYTHONUNBUFFERED: true
    # databases
    REDIS_URL: "redis://default:${REDIS_PASSWORD}@redis:6379/0"
    POSTGRES_DB: ${POSTGRES_DB}
    POSTGRES_USER: ${POSTGRES_USER}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    POSTGRES_HOST: "postgres"
    # django config
    DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
    DJANGO_SETTINGS_MODULE: "mainpage.deployment_settings"
    DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
    HOST_NAME: ${HOST_NAME}
    HOSTING_VM_TEMPLATES: "/opt/app/mainpage/vm_templates.json"



services:
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_PASSWORD
      - POSTGRES_USER
      - POSTGRES_DB
    volumes:
      - postgres:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 1s
      timeout: 1s
      retries: 30

  caddy:
    image: caddy:2.10-alpine
    ports:
      - "127.0.0.1:80:80"
    volumes:
      - caddy-data:/data
      - caddy-config:/config
      - staticfiles:/srv/static
      - imagefiles:/srv/media
      - ./${CADDY_CONFIG:-Caddyfile}:/etc/caddy/Caddyfile
    environment:
      - HOST_NAME

  redis:
    image: redis:7.4-alpine
    volumes:
      - redis:/data
    command: redis-server --requirepass ${REDIS_PASSWORD:?error}

  django:
    <<: *common-django
    network_mode: service:caddy
    depends_on:
      postgres:
        condition: service_healthy
    command: gunicorn --bind localhost:8000 mainpage.wsgi

  django-q:
    <<: *common-django
    depends_on:
      postgres:
        condition: service_healthy
    command: python manage.py qcluster

  collect-static:
    <<: *common-django
    command: python3 manage.py collectstatic --no-input

  shell:
    <<: *common-django
    command: sh
    profiles:
      - donotstart

  migrate:
    <<: *common-django
    command: sh -c "python3 manage.py makemigrations --check && python3 manage.py migrate"
    depends_on:
      postgres:
        condition: service_healthy
