{% extends 'base.html' %}
{% load static %}
{% load crispy_forms_tags %}
{% block content %}
    <br>
    <section>
        <div class="container">
            <div class="row align-items-center">
                <div class="col-lg-12 order-lg-1">
                    <div class="page-header">
                        <h1>Sign up for TEAMS</h1>
                        <strong>If your team is already registered, ask a teammate for
                            the magic link!</strong>
                    </div>
                    <hr>
                    <div class="flatpage-content col-xs-12">
                        <form action="{% url 'signup' %}" method="POST">
                            {{ signupForm | crispy }}
                            {% csrf_token %}
                            <button type="submit" class="btn btn-primary">Register
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
{% endblock %}
