{% extends 'base.html' %}
{% load static %}
{% load crispy_forms_tags %}
{% block content %}
    <br>
    <section>
        <div class="container">
            <div class="row align-items-center">
                <div class="col-lg-12 order-lg-1">
                    <div class="page-header">
                        <h1>Sign up for Players</h1>
                        {% if team %}
                            <p>
                                Upon completing registration, you will be part of team:
                                <strong>
                                    {{ team.name }}
                                </strong>
                            </p>
                        {% endif %}
                    </div>
                    <hr>
                    <div class="flatpage-content col-xs-12">
                        <form action="{% url 'signup_player' %}" method="POST">
                            {{ player_signup | crispy }}
                            {% csrf_token %}
                            <button type="submit" class="btn btn-primary">Register
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
{% endblock %}
