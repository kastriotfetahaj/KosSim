name: enochecker_test

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: arc-runner-dink
    env:
      ENOCHECKER_TEST_CHECKER_PORT: 8500
    steps:
    - uses: attacking-lab/actions/.github/actions/github-credentials-store@main
      with:
        password: ${{ secrets.CI_PAT }}
    - uses: actions/checkout@v2
      with:
        submodules: recursive
    - name: Set up Python 3.13
      uses: actions/setup-python@v2
      with:
        python-version: 3.13
    - name: Install enochecker_test
      run: |
        python -m pip install --upgrade pip
        pip install git+https://github.com/attacking-lab/enochecker-core@v0.13.0
        pip install git+https://github.com/attacking-lab/enochecker-test@v0.13.0
    - name: Log in to registry
      uses: docker/login-action@f4ef78c080cd8ba55a85445d5b36e214a81df20a
      with:
        registry: https://${{ vars.registry }}
        username: ${{ secrets.REGISTRY_USER }}
        password: ${{ secrets.REGISTRY_TOKEN }}
    - name: Run build.sh if necessary
      run: |
        test ! -f build.sh || bash build.sh
    - name: "Package service and checker artifacts"
      uses: attacking-lab/actions/package-service@main
    - name: Start service
      run: |
        cd service
        docker compose up --build --force-recreate --detach
    - name: Start checker
      run: |
        cd checker
        echo "GITHUB_PAT=${{ secrets.CI_PAT }}" >> .env
        docker compose up --build --force-recreate --detach
    - name: Obtain service and checker IPs
      run: |
        echo "ENOCHECKER_SERVICE_ADDRESS=$(docker network inspect heavensent-checker | jq -r '.[].IPAM.Config[].Gateway')" | tee -a $GITHUB_ENV
        echo "ENOCHECKER_CHECKER_ADDRESS=$(docker network inspect heavensent-checker | jq -r '.[].IPAM.Config[].Gateway')" | tee -a $GITHUB_ENV
        echo "ENOCHECKER_SERVICE_PORT=9500" | tee -a $GITHUB_ENV
        echo "ENOCHECKER_CHECKER_PORT=8500" | tee -a $GITHUB_ENV
    - name: Run enochecker_test
      run: |
        enochecker_test
    - name: Upload service package
      uses: attacking-lab/actions/package-service-upload@main
      with:
        token: ${{ secrets.ARTIFACT_PUSH_TOKEN }}
    - name: Dump docker logs on failure
      if: failure()
      uses: jwalton/gh-docker-logs@v1
      with:
        dest: './logs'
    - name: Print logs
      if: failure()
      run: |
        find ./logs -type f -exec echo -e "\n\e[32m{}\e[0m": \; -exec cat {} \;
    - name: Kill Docker containers
      if: failure() || success()
      run: |
        (cd service && docker compose down --volumes)
        (cd checker && docker compose down --volumes)

