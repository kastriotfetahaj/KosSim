name: enochecker_test

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: arc-runner-dink
    env:
      ENOCHECKER_TEST_CHECKER_PORT: 8200
      ENOCHECKER_CHECKER_PORT: 8200
      ENOCHECKER_SERVICE_NETWORK: gitter_default
      ENOCHECKER_CHECKER_NETWORK: gitter-checker
    steps:
    - uses: attacking-lab/actions/.github/actions/github-credentials-store@main
      with:
        password: ${{ secrets.CI_PAT }}
    - uses: actions/checkout@v2
      with:
        submodules: recursive
    - name: Set up Python 3.13
      uses: actions/setup-python@v2
      with:
        python-version: 3.13
    - name: Install enochecker_test
      run: |
        python -m pip install --upgrade pip
        pip install git+https://github.com/attacking-lab/enochecker-core@v0.13.0
        pip install git+https://github.com/attacking-lab/enochecker-test@v0.13.0
    - name: build binary
      run: |
        cd service
        ln -s ../meta/docker-compose.override.yml docker-compose.override.yml
        docker compose run --rm --build ssh-build
        rm docker-compose.override.yml
    - name: "Package service and checker artifacts"
      uses: attacking-lab/actions/package-service@main
    - name: start service
      run: |
        cd service
        docker compose up --build --force-recreate -d
    - name: start checker
      run: |
        cd checker
        echo "GITHUB_PAT=${{ secrets.CI_PAT }}" >> .env
        docker compose up --build --force-recreate -d
    - name: run enochecker_test
      run: |
        enochecker_test
    - name: Upload service package
      uses: attacking-lab/actions/package-service-upload@main
      with:
        token: ${{ secrets.ARTIFACT_PUSH_TOKEN }}
    - name: Dump docker logs on failure
      if: failure()
      uses: jwalton/gh-docker-logs@v1
      with:
        dest: './logs'
    - name: Print logs
      if: failure()
      run: |
        find ./logs -type f -exec echo -e "\n\e[32m{}\e[0m": \; -exec cat {} \;
    - name: Kill docker containers
      if: failure() || success()
      run: |
        (cd service && docker compose down -v)
        (cd checker && docker compose down -v)
