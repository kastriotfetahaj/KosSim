name: KosSim CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  real-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: make setup
      - name: Verify platform
        run: make verify
      - name: Validate checker package
        run: make checkers
      - name: Validate exploit package
        run: make exploits
      - name: Validate patch package
        run: make patches

  docker-smoke:
    runs-on: ubuntu-latest
    needs: real-gate
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: make setup
      - name: Boot generated stack smoke
        run: make smoke-docker
