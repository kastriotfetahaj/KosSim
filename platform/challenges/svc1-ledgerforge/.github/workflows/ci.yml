name: ledgerforge

on:
  push:
    paths:
      - "platform/challenges/svc1-ledgerforge/**"
      - ".github/workflows/ledgerforge-ci.yml"
  pull_request:
    paths:
      - "platform/challenges/svc1-ledgerforge/**"

defaults:
  run:
    working-directory: platform/challenges/svc1-ledgerforge

jobs:
  cargo-check-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: platform/challenges/svc1-ledgerforge/service
      - working-directory: platform/challenges/svc1-ledgerforge/service
        run: cargo check --all-targets
      - working-directory: platform/challenges/svc1-ledgerforge/service
        run: cargo test --no-fail-fast

  docker-checker-baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build service image
        working-directory: platform/challenges
        run: docker build -t ledgerforge-service -f svc1-ledgerforge/service/Dockerfile .
      - name: Run service
        run: |
          docker run -d --rm --name lfsvc \
            -e SERVICE_PUSH_SECRET=ci-secret-32-bytes-padding-hellllo \
            -e TEAM_NAME=ci \
            -e SERVICE_NAME=svc1 \
            -p 8081:8080 \
            ledgerforge-service
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8081/health >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
      - name: Run sync checker
        env:
          SERVICE_PUSH_SECRET: ci-secret-32-bytes-padding-hellllo
        run: |
          pip install --quiet requests
          python checker/checker.py http://127.0.0.1:8081
      - name: Run exploits against unpatched service
        env:
          SERVICE_PUSH_SECRET: ci-secret-32-bytes-padding-hellllo
        run: |
          set -eux
          for v in 0 1 2; do
            FLAG="FLAG{CI_EXP_${v}_$(date +%s)}"
            INFO=$(curl -fsS -H "X-Checker-Secret: $SERVICE_PUSH_SECRET" \
              -H 'Content-Type: application/json' \
              -d "{\"method\":\"PUTFLAG\",\"current_round_id\":900,\"variant_id\":${v},\"flag\":\"${FLAG}\"}" \
              http://127.0.0.1:8081/ | python -c "import sys,json;print(json.load(sys.stdin)['attack_info'])")
            python "exploits/exp$((v+1)).py" 127.0.0.1:8081 "$INFO" | grep -F "$FLAG"
          done
      - name: Stop service
        if: always()
        run: docker rm -f lfsvc || true

  sla-after-patch:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        patch:
          - patches/flagstore-0/vuln-a-canonicalization.patch
          - patches/flagstore-0/vuln-b-snapshot-claim-prefix.patch
          - patches/flagstore-0/vuln-c-lfql-load-public-bypass.patch
          - patches/flagstore-1/vuln-d-length-extension.patch
          - patches/flagstore-2/vuln-e-empty-scope-universal.patch
    steps:
      - uses: actions/checkout@v4
      - name: Apply patch
        run: patch -p1 < "${{ matrix.patch }}"
      - name: Build patched service
        working-directory: platform/challenges
        run: docker build -t ledgerforge-patched -f svc1-ledgerforge/service/Dockerfile .
      - name: Run patched service
        run: |
          docker run -d --rm --name lfpatched \
            -e SERVICE_PUSH_SECRET=ci-secret-32-bytes-padding-hellllo \
            -e TEAM_NAME=ci \
            -e SERVICE_NAME=svc1 \
            -p 8081:8080 \
            ledgerforge-patched
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8081/health >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
      - name: SLA must hold under patch
        env:
          SERVICE_PUSH_SECRET: ci-secret-32-bytes-padding-hellllo
        run: |
          pip install --quiet requests
          python checker/checker.py http://127.0.0.1:8081
      - name: Stop service
        if: always()
        run: docker rm -f lfpatched || true
