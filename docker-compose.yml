      start_period: 10s
    networks:
      - ctf_net


  team1-svc3:
    <<: *svc3
    environment:
      TEAM_NAME: team1
      SERVICE_NAME: svc3
      BOOT_FLAG: FLAG{BOOT_team1_svc3}
      SERVICE_PUSH_SECRET: ${SERVICE_PUSH_SECRET:?set SERVICE_PUSH_SECRET}
