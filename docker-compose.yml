    SERVICE_PUSH_SECRET: ${SERVICE_PUSH_SECRET:?set SERVICE_PUSH_SECRET}
  mem_limit: 384m
  cpus: 0.75
  healthcheck:
    test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health >/dev/null"]
    interval: 10s
    timeout: 3s
    retries: 6
    start_period: 10s
  networks:
    - ctf_net

x-nat-gateway: &nat-gateway
  build:
    context: ./platform/nat-gateway
  restart: unless-stopped
  mem_limit: 192m
  cpus: 0.35
  healthcheck:
    test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=2).read()"]
    interval: 10s
    timeout: 3s
    retries: 6
    start_period: 10s
  networks:
    - ctf_net

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: kossim
      POSTGRES_USER: kossim
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kossim -d kossim"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    mem_limit: 512m
    cpus: 1.0
    networks:
      - ctf_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    mem_limit: 256m
    cpus: 0.5
    networks:
      - ctf_net

  control-api:
    build:
      context: ./platform/control
    restart: unless-stopped
    environment: *control-env
    volumes:
      - ./platform/challenges:/challenges:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8088:8000"
      - "1337:1337"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s
    mem_limit: 512m
    cpus: 1.0
    networks:
      - ctf_net

  flag-rotator:
    build:
      context: ./platform/control
    restart: unless-stopped
    environment: *control-env
    command: ["python", "-m", "app.rotator"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      control-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import os, psycopg2; conn = psycopg2.connect(os.environ['DATABASE_URL']); conn.close()"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s
    mem_limit: 512m
    cpus: 1.0
    networks:
      - ctf_net

  checker-worker:
    build:
      context: ./platform/control
    restart: unless-stopped
    user: "0:0"
    environment: *control-env
    volumes:
      - ./platform/challenges:/challenges:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/workspace:ro
    command: ["sh", "-c", "celery -A app.worker:celery_app worker --loglevel=${CELERY_LOG_LEVEL:-INFO} --concurrency=${CHECKER_WORKER_CONCURRENCY:-4} -Q checkers,vulnboxes,celery"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import os, redis; redis.Redis.from_url(os.environ['REDIS_URL']).ping()"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s
    mem_limit: 768m
    cpus: 1.0
    networks:
      - ctf_net

  team1-nat:
    <<: *nat-gateway
    environment:
      NAT_TEAM: team1
    ports:
      - "18081:8080"

  team1-svc1:
    <<: *svc1
    environment:
      TEAM_NAME: team1
      SERVICE_NAME: svc1
      BOOT_FLAG: FLAG{BOOT_team1_svc1}
      SERVICE_PUSH_SECRET: ${SERVICE_PUSH_SECRET:?set SERVICE_PUSH_SECRET}
    volumes:
      - ledgerforge_team1_data:/var/lib/ledgerforge

  team1-svc2:
    <<: *svc2
    environment:
      TEAM_NAME: team1
      SERVICE_NAME: svc2
      BOOT_FLAG: FLAG{BOOT_team1_svc2}
      SERVICE_PUSH_SECRET: ${SERVICE_PUSH_SECRET:?set SERVICE_PUSH_SECRET}
      VAULTGRID_CRYPT_HOST: team1-vg-crypt
      VAULTGRID_CRYPT_PORT: 4102
      VAULTGRID_FEED_HOST: team1-vg-feed
      VAULTGRID_FEED_PORT: 4103
    volumes:
      - vaultgrid_team1_data:/var/lib/vaultgrid
  team1-vg-crypt:
    build:
      context: ./platform/challenges
      dockerfile: svc2-vaultgrid/crypt/Dockerfile
    restart: unless-stopped
    environment:
      SERVICE_PUSH_SECRET: ${SERVICE_PUSH_SECRET:?set SERVICE_PUSH_SECRET}
    volumes:
      - vaultgrid_crypt_team1_data:/var/lib/vaultgrid-crypt
    mem_limit: 192m
    cpus: 0.4
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:4102/health >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    networks:
      - ctf_net

  team1-vg-feed:
    build:
      context: ./platform/challenges
      dockerfile: svc2-vaultgrid/feed/Dockerfile
    restart: unless-stopped
    environment:
      SERVICE_PUSH_SECRET: ${SERVICE_PUSH_SECRET:?set SERVICE_PUSH_SECRET}
    volumes:
